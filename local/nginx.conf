events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # Compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # Root directory for the frontend (mounted to docs/)
        location / {
            root /usr/share/nginx/html;
            index index.html;

            # Replace the Hugging Face repository prefix with the local data path
            sub_filter 'https://huggingface.co/datasets/markmclaren/global-bathymetry-pmtiles/resolve/main/' '/data/';
            
            # Map the old 2025 filename to the new 2026 version you've provided
            sub_filter 'gebco-2025-rawrgb-z0-6-webp.pmtiles' 'test_z6.pmtiles';
            
            sub_filter_once off;
            sub_filter_types application/javascript application/json text/html;
        }

        # PMTiles storage (mounted to local/data/)
        location /data/ {
            alias /data/;
            
            # CORS headers for local development
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # PMTiles requires HTTP Range requests (Nginx supports this by default)
        }
    }
}
