events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # Compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # Root directory for the frontend (mounted to docs/)
        location / {
            root /usr/share/nginx/html;
            index index.html;

            # Map the old 2025 filename to the new 2026 version for legacy support
            sub_filter 'gebco-2025-rawrgb-z0-6-webp.pmtiles' 'gebco_2026_terrain_rgb.pmtiles';
            
            sub_filter_once off;
            sub_filter_types application/javascript application/json text/html;
        }

        # PMTiles storage (mounted to local/data/)
        # Serve local files first, then fall back to Hugging Face when missing.
        location /data/ {
            root /;
            rewrite ^/data/(.*)$ /$1 break;
            
            # CORS headers for local development
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Try local file first (/data/<file> on disk), else proxy to Hugging Face.
            try_files /data$uri @hf_pmtiles;
        }

        location @hf_pmtiles {
            internal;

            # Preserve byte-range behavior required by PMTiles clients.
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_set_header Host huggingface.co;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_set_header Accept-Encoding "";
            proxy_force_ranges on;

            # CORS for browser PMTiles requests.
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            rewrite ^ /datasets/markmclaren/global-bathymetry-pmtiles/resolve/main$uri break;
            proxy_pass https://huggingface.co;
        }
    }
}
