<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEBCO 3D Bathymetry Demo</title>
    <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background: #020814; color: #e2f1ff; font-family: "Avenir Next", "Segoe UI", sans-serif; overflow: hidden; }
        #map { position: absolute; inset: 0; }
        
        .panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(3, 17, 34, 0.78);
            border: 1px solid rgba(166, 209, 250, 0.35);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            width: 320px;
            pointer-events: auto;
        }

        h1 { margin: 0; font-size: 18px; font-weight: 700; color: #bfe2ff; }
        p { margin: 0; font-size: 13px; line-height: 1.5; color: #c4dbf2; opacity: 0.9; }
        
        .label {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #b7d9fb;
            font-weight: 700;
            margin-bottom: -4px;
        }

        select {
            appearance: none;
            width: 100%;
            border: 1px solid rgba(166, 209, 250, 0.4);
            border-radius: 8px;
            background: rgba(4, 26, 50, 0.9);
            color: #e4f3ff;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:hover { border-color: rgba(166, 209, 250, 0.7); }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #7bc5ff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #bfe2ff; }
        .back-link svg { margin-right: 6px; }

        .attribution-custom {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .maplibregl-popup.depth-popup .maplibregl-popup-content {
            background: rgba(6, 18, 34, 0.96);
            color: #eef7ff;
            border: 1px solid rgba(166, 209, 250, 0.45);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(2, 7, 15, 0.55);
            font-size: 12px;
            line-height: 1.35;
            padding: 8px 10px;
            backdrop-filter: blur(8px);
        }
        .maplibregl-popup.depth-popup .maplibregl-popup-tip {
            border-top-color: rgba(6, 18, 34, 0.96);
            border-bottom-color: rgba(6, 18, 34, 0.96);
        }
        .maplibregl-popup.depth-popup strong {
            color: #bfe2ff;
            font-weight: 700;
        }
    </style>
    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@4.3.0/dist/pmtiles.js"></script>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <a href="../" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to 2D Map
        </a>
        <h1>GEBCO 3D Terrain</h1>
        
        <div class="label">Raw RGB Palette</div>
        <select id="style-select">
            <optgroup label="EMODnet / GEBCO">
                <option value="rainbowcolour">rainbowcolour</option>
                <option value="multicolour">multicolour</option>
                <option value="atlas_land">atlas_land</option>
                <option value="bluegreen">bluegreen</option>
            </optgroup>
            <optgroup label="Project Classics">
                <option value="classic_ocean">classic_ocean</option>
                <option value="seafloor_heat">seafloor_heat</option>
                <option value="monochrome_dark">monochrome_dark</option>
                <option value="nautical_chart">nautical_chart</option>
                <option value="deep_earth">deep_earth</option>
            </optgroup>
            <optgroup label="Scientific">
                <option value="viridis">viridis</option>
                <option value="plasma">plasma</option>
            </optgroup>
            <optgroup label="cmocean">
                <option value="cmo_deep">cmo_deep</option>
                <option value="cmo_topo">cmo_topo</option>
                <option value="cmo_gray">cmo_gray</option>
            </optgroup>
        </select>

        <div class="label">Land Theme</div>
        <select id="land-select">
            <option value="dark">Black land</option>
            <option value="light">White land</option>
            <option value="satellite">Satellite land</option>
        </select>

        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; cursor: pointer;">
            <input id="labels-toggle" type="checkbox" style="accent-color: #7bc5ff;" /> Labels on
        </label>

        <div class="label" style="margin-top: 4px;">Vertical Exaggeration: <span id="exag-val">15</span>x</div>
        <input id="exag-slider" type="range" min="1" max="50" value="15" style="width: 100%; accent-color: #7bc5ff;" />

        <div id="legend-container" style="margin-top: 12px; display: none;">
            <div class="label" style="margin-bottom: 6px;">Depth Legend (meters)</div>
            <div id="legend-gradient" style="height: 12px; width: 100%; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);"></div>
            <div id="legend-labels" style="display: flex; justify-content: space-between; font-size: 10px; margin-top: 4px; color: #c4dbf2; opacity: 0.8;">
                <span>11000m</span>
                <span>0m</span>
            </div>
        </div>

        <p style="margin-top: 8px; font-size: 11px; opacity: 0.7;">GEBCO data rendered in 3D with MapLibre GL JS.</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
